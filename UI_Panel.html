<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Extension UI Panel (inline styles)</title>
</head>
<body style="margin:0;background:transparent;font-family:ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans';">
  <div id="card" class="card"
       style="background:#111827;color:#e5e7eb;border-radius:16px;padding:14px 16px;
              box-shadow:0 12px 24px rgba(0,0,0,.35);
              display:flex;align-items:center;gap:10px;white-space:nowrap;justify-content:flex-start;">
    <div class="col" style="display:flex;align-items:center;">
      <span id="status"
            style="display:inline-flex;align-items:center;gap:8px;font-weight:800;font-size:14px;
                   padding:6px 12px;border-radius:999px;border:1px solid #fecaca;
                   color:#991b1b;background:#fee2e2;">
        <span style="width:10px;height:10px;border-radius:999px;background:#ef4444;display:inline-block;"></span>
        拡張機能：停止中
      </span>
    </div>
    <div class="actions" style="display:flex;align-items:center;gap:8px;flex-wrap:nowrap;margin-left:8px;">
      <button id="act"
              style="border:1px solid transparent;border-radius:10px;padding:8px 14px;font-size:14px;font-weight:600;cursor:pointer;
                     color:#fff;background:linear-gradient(135deg,#3b82f6 0%,#60a5fa 100%);">
        実行
      </button>
      <button id="settings"
              style="border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:8px 14px;font-size:14px;font-weight:600;cursor:pointer;
                     color:#f3f4f6;background:rgba(255,255,255,0.08);">
        設定
      </button>
      <button id="stopAlarm" style="display:none;border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:8px 14px;font-size:14px;font-weight:600;cursor:pointer;
                     color:#f3f4f6;background:rgba(255,255,255,0.08);">
        アラーム停止
      </button>
      <button id="clear" style="display:none;border:1px solid rgba(255,255,255,0.15);border-radius:10px;padding:8px 14px;font-size:14px;font-weight:600;cursor:pointer;
                     color:#f3f4f6;background:rgba(255,255,255,0.08);">
        通知の消去
      </button>
<div id="pills"
     style="
       display:none;
       align-items:center;
       gap:8px;
       flex-wrap:nowrap;
       overflow-x:auto;
       -webkit-overflow-scrolling:touch;
       padding:6px 4px;
       max-width:100%;
       scrollbar-width:none;
     ">
</div>
    </div>
  </div>

  <div id="settings-container" style="width:100%;display:flex;justify-content:flex-start;margin-top:10px;"></div>

  <script src="UI_Panel.js"></script>
</body>
</html>
